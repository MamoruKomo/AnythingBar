name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: >-
          xcodebuild
          -resolvePackageDependencies
          -project AnythingBar.xcodeproj
          -scheme AnythingBar

      - name: Build app
        run: >-
          xcodebuild
          -project AnythingBar.xcodeproj
          -scheme AnythingBar
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/AnythingBarDerivedData"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Run tests
        run: >-
          xcodebuild
          -project AnythingBar.xcodeproj
          -scheme AnythingBar
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/AnythingBarDerivedData"
          CODE_SIGNING_ALLOWED=NO
          test
